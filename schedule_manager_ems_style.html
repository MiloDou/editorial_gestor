
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sand: #8B7355; --sand-light: #A08C6E; --sand-bg: #F5F0E8;
    --sand-dark: #6B5A42; --sand-sidebar: #9B8468;
    --white: #FDFCF9; --text-dark: #3D3020; --text-mid: #6B5A42;
    --text-light: #9B8468; --accent: #C4A882; --green: #7A9E7E;
    --amber: #D4A843; --red: #C07070; --border: rgba(139,115,85,0.15);
  }
  body { font-family: 'Georgia', serif; background: var(--sand-bg); display: flex; height: 600px; overflow: hidden; border-radius: 16px; }

  /* SIDEBAR */
  .sidebar {
    width: 220px; min-width: 220px; background: var(--sand-sidebar);
    border-radius: 16px; margin: 8px; padding: 16px 12px;
    display: flex; flex-direction: column; gap: 6px; color: white;
  }
  .brand { text-align: center; padding: 12px 0 16px; border-bottom: 1px solid rgba(255,255,255,0.15); margin-bottom: 6px; }
  .brand-icon { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; font-size: 18px; }
  .brand h3 { font-size: 14px; font-weight: normal; letter-spacing: 0.5px; }
  .brand p { font-size: 11px; opacity: 0.7; font-family: sans-serif; }

  .nav-btn {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: 10px; cursor: pointer; font-size: 13px;
    font-family: sans-serif; border: none; background: transparent;
    color: rgba(255,255,255,0.8); width: 100%; text-align: left;
    transition: background 0.15s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.1); }
  .nav-btn.active { background: rgba(255,255,255,0.18); color: white; }
  .nav-icon { font-size: 14px; width: 16px; text-align: center; }

  .sidebar-footer { margin-top: auto; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 12px; }
  .user-row { display: flex; align-items: center; gap: 10px; padding: 8px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; font-size: 12px; font-family: sans-serif; font-weight: 500; }
  .user-name { font-size: 13px; }
  .user-role { font-size: 11px; opacity: 0.65; font-family: sans-serif; }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-size: 22px; color: var(--text-dark); font-weight: normal; }
  .topbar p { font-size: 12px; color: var(--text-light); font-family: sans-serif; margin-top: 2px; }
  .add-btn {
    background: var(--sand); color: white; border: none; border-radius: 10px;
    padding: 8px 16px; font-size: 13px; font-family: sans-serif; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: background 0.15s;
  }
  .add-btn:hover { background: var(--sand-dark); }

  .content { flex: 1; overflow-y: auto; padding: 16px 24px 20px; display: flex; flex-direction: column; gap: 20px; }

  /* PROJECT CARD */
  .project-card { background: var(--white); border-radius: 14px; border: 0.5px solid var(--border); overflow: hidden; }
  .project-header { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid var(--border); cursor: pointer; }
  .project-name { font-size: 15px; color: var(--text-dark); }
  .project-meta { display: flex; align-items: center; gap: 10px; }
  .badge { font-size: 11px; font-family: sans-serif; padding: 3px 9px; border-radius: 20px; }
  .badge.active { background: #E8F4EA; color: #4A7A4E; }
  .badge.done { background: #F0EDE8; color: #7A6A55; }
  .progress-wrap { flex: 1; height: 4px; background: #EDE8E0; border-radius: 4px; margin: 0 12px; max-width: 100px; }
  .progress-bar { height: 100%; border-radius: 4px; background: var(--sand); }
  .pct { font-size: 12px; color: var(--text-light); font-family: sans-serif; }

  /* TASKS */
  .tasks-wrap { padding: 10px 18px 14px; display: flex; flex-direction: column; gap: 8px; }
  .task-row { display: flex; align-items: center; gap: 12px; padding: 8px 10px; border-radius: 8px; border: 0.5px solid transparent; transition: border 0.15s, background 0.15s; cursor: pointer; }
  .task-row:hover { background: #FAF7F2; border-color: var(--border); }
  .task-check { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--accent); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; }
  .task-check.done-check { background: var(--sand); border-color: var(--sand); color: white; }
  .task-name { flex: 1; font-size: 13px; font-family: sans-serif; color: var(--text-dark); }
  .task-name.striked { text-decoration: line-through; color: var(--text-light); }
  .task-dates { font-size: 11px; font-family: sans-serif; color: var(--text-light); white-space: nowrap; }
  .task-status { font-size: 11px; font-family: sans-serif; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  .s-pending { background: #FFF3E0; color: #9A6E20; }
  .s-progress { background: #E3EEF9; color: #2E6A9A; }
  .s-done { background: #EAF3EB; color: #3A7040; }

  /* GANTT */
  .gantt-wrap { padding: 10px 18px 14px; }
  .gantt-label { font-size: 11px; font-family: sans-serif; color: var(--text-light); margin-bottom: 8px; }
  .gantt-months { display: flex; font-size: 10px; font-family: sans-serif; color: var(--text-light); margin-bottom: 4px; padding-left: 120px; gap: 0; }
  .gantt-month { flex: 1; text-align: center; }
  .gantt-row { display: flex; align-items: center; margin-bottom: 6px; }
  .gantt-task-name { width: 120px; font-size: 12px; font-family: sans-serif; color: var(--text-mid); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 8px; }
  .gantt-track { flex: 1; height: 18px; background: #EDE8E0; border-radius: 4px; position: relative; overflow: hidden; }
  .gantt-bar { position: absolute; top: 2px; height: 14px; border-radius: 3px; }

  .add-task-btn { display: flex; align-items: center; gap: 6px; font-size: 12px; font-family: sans-serif; color: var(--text-light); border: 1px dashed var(--accent); border-radius: 8px; padding: 7px 10px; margin: 0 18px 14px; cursor: pointer; background: none; width: calc(100% - 36px); transition: border-color 0.15s, color 0.15s; }
  .add-task-btn:hover { border-color: var(--sand); color: var(--sand); }

  .tab-row { display: flex; gap: 4px; padding: 0 18px 8px; }
  .tab { font-size: 12px; font-family: sans-serif; padding: 4px 12px; border-radius: 20px; cursor: pointer; border: none; background: transparent; color: var(--text-light); }
  .tab.active-tab { background: #EDE8E0; color: var(--text-dark); }

  .modal-overlay { position: absolute; inset: 0; background: rgba(60,40,20,0.25); display: none; align-items: center; justify-content: center; border-radius: 16px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: 14px; padding: 24px; width: 340px; display: flex; flex-direction: column; gap: 14px; }
  .modal h3 { font-size: 16px; color: var(--text-dark); font-weight: normal; }
  .modal label { font-size: 12px; font-family: sans-serif; color: var(--text-light); display: block; margin-bottom: 4px; }
  .modal input, .modal select { width: 100%; padding: 8px 10px; border: 0.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: sans-serif; background: var(--sand-bg); color: var(--text-dark); outline: none; }
  .modal input:focus, .modal select:focus { border-color: var(--sand); }
  .modal-row { display: flex; gap: 10px; }
  .modal-row > div { flex: 1; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 4px; }
  .btn-cancel { background: transparent; border: 0.5px solid var(--border); padding: 8px 16px; border-radius: 8px; font-size: 13px; font-family: sans-serif; cursor: pointer; color: var(--text-mid); }
  .btn-save { background: var(--sand); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-family: sans-serif; cursor: pointer; }
  .btn-save:hover { background: var(--sand-dark); }

  .empty-state { text-align: center; padding: 30px; font-size: 13px; font-family: sans-serif; color: var(--text-light); }
</style>

<div style="position: relative; height: 600px; display: flex; background: var(--sand-bg); border-radius: 16px; overflow: hidden;">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">
    <div class="brand-icon">&#128197;</div>
    <h3>Schedule Pro</h3>
    <p>Gestión de Proyectos</p>
  </div>
  <button class="nav-btn active" onclick="setView('tareas')"><span class="nav-icon">&#9632;</span> Cronogramas</button>
  <button class="nav-btn" onclick="setView('gantt')"><span class="nav-icon">&#9776;</span> Vista Gantt</button>
  <button class="nav-btn" onclick="setView('resumen')"><span class="nav-icon">&#9650;</span> Resumen</button>
  <button class="nav-btn"><span class="nav-icon">&#9881;</span> Configuración</button>

  <div class="sidebar-footer">
    <div class="user-row">
      <div class="avatar">TU</div>
      <div>
        <div class="user-name" style="font-size:13px;font-family:sans-serif;">Tu Nombre</div>
        <div class="user-role">Administrador</div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main-area">
  <div class="topbar">
    <div>
      <h1 id="view-title">Cronogramas</h1>
      <p id="view-sub">Gestiona tus proyectos y tareas</p>
    </div>
    <button class="add-btn" onclick="openModal()">+ Nuevo Proyecto</button>
  </div>
  <div class="content" id="content-area"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Nuevo Proyecto</h3>
    <div>
      <label>Nombre del proyecto</label>
      <input id="inp-proj" placeholder="Ej: Rediseño de sitio web" />
    </div>
    <div class="modal-row">
      <div><label>Fecha inicio</label><input id="inp-start" type="date" /></div>
      <div><label>Fecha fin</label><input id="inp-end" type="date" /></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveProject()">Guardar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <h3>Nueva Tarea</h3>
    <div>
      <label>Nombre de la tarea</label>
      <input id="inp-task" placeholder="Ej: Diseño de wireframes" />
    </div>
    <div class="modal-row">
      <div><label>Inicio</label><input id="inp-task-start" type="date" /></div>
      <div><label>Fin</label><input id="inp-task-end" type="date" /></div>
    </div>
    <div>
      <label>Estado</label>
      <select id="inp-status">
        <option value="pending">Pendiente</option>
        <option value="progress">En progreso</option>
        <option value="done">Completada</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeTaskModal()">Cancelar</button>
      <button class="btn-save" onclick="saveTask()">Guardar</button>
    </div>
  </div>
</div>

</div>

<script>
let currentView = 'tareas';
let currentProjectId = null;
let projects = [
  {
    id: 1, name: 'Rediseño de Sitio Web', status: 'active',
    start: '2025-01-01', end: '2025-06-30',
    tasks: [
      { id: 1, name: 'Investigación de usuarios', start: '2025-01-01', end: '2025-01-31', status: 'done' },
      { id: 2, name: 'Wireframes y prototipos', start: '2025-02-01', end: '2025-03-15', status: 'done' },
      { id: 3, name: 'Desarrollo frontend', start: '2025-03-16', end: '2025-05-30', status: 'progress' },
      { id: 4, name: 'Pruebas de calidad', start: '2025-06-01', end: '2025-06-30', status: 'pending' },
    ]
  },
  {
    id: 2, name: 'App Móvil v2.0', status: 'active',
    start: '2025-02-01', end: '2025-08-31',
    tasks: [
      { id: 1, name: 'Diseño UI/UX', start: '2025-02-01', end: '2025-03-31', status: 'done' },
      { id: 2, name: 'Backend API', start: '2025-03-01', end: '2025-06-30', status: 'progress' },
      { id: 3, name: 'Testing y lanzamiento', start: '2025-07-01', end: '2025-08-31', status: 'pending' },
    ]
  }
];
let nextProjId = 3;

function setView(v) {
  currentView = v;
  document.querySelectorAll('.nav-btn').forEach((b,i) => {
    b.classList.toggle('active', ['tareas','gantt','resumen'][i] === v);
  });
  const titles = { tareas: 'Cronogramas', gantt: 'Vista Gantt', resumen: 'Resumen General' };
  const subs = { tareas: 'Gestiona tus proyectos y tareas', gantt: 'Visualiza el tiempo de cada tarea', resumen: 'Estado general de todos los proyectos' };
  document.getElementById('view-title').textContent = titles[v] || v;
  document.getElementById('view-sub').textContent = subs[v] || '';
  render();
}

function getStatusClass(s) { return s === 'done' ? 's-done' : s === 'progress' ? 's-progress' : 's-pending'; }
function getStatusLabel(s) { return s === 'done' ? 'Completada' : s === 'progress' ? 'En progreso' : 'Pendiente'; }
function getProgress(tasks) {
  if (!tasks.length) return 0;
  return Math.round((tasks.filter(t => t.status === 'done').length / tasks.length) * 100);
}

function render() {
  const area = document.getElementById('content-area');
  if (currentView === 'tareas') renderTareas(area);
  else if (currentView === 'gantt') renderGantt(area);
  else renderResumen(area);
}

function renderTareas(area) {
  if (!projects.length) { area.innerHTML = '<div class="empty-state">No hay proyectos. ¡Crea el primero!</div>'; return; }
  area.innerHTML = projects.map(p => {
    const pct = getProgress(p.tasks);
    const taskRows = p.tasks.map(t => `
      <div class="task-row" onclick="toggleTask(${p.id},${t.id})">
        <div class="task-check ${t.status==='done'?'done-check':''}">${t.status==='done'?'✓':''}</div>
        <span class="task-name ${t.status==='done'?'striked':''}">${t.name}</span>
        <span class="task-dates">${fmtDate(t.start)} → ${fmtDate(t.end)}</span>
        <span class="task-status ${getStatusClass(t.status)}">${getStatusLabel(t.status)}</span>
      </div>`).join('');
    return `
      <div class="project-card">
        <div class="project-header">
          <span class="project-name">${p.name}</span>
          <div class="project-meta">
            <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
            <span class="pct">${pct}%</span>
            <span class="badge active">${p.status === 'active' ? 'Activo' : 'Finalizado'}</span>
          </div>
        </div>
        <div class="tasks-wrap">${taskRows || '<div style="font-size:12px;font-family:sans-serif;color:var(--text-light);padding:4px 0">Sin tareas aún</div>'}</div>
        <button class="add-task-btn" onclick="openTaskModal(${p.id})">+ Agregar tarea</button>
      </div>`;
  }).join('');
}

function renderGantt(area) {
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago'];
  const allStart = new Date('2025-01-01').getTime();
  const allEnd = new Date('2025-08-31').getTime();
  const totalDays = (allEnd - allStart) / 86400000;
  const colors = { done: '#8B7355', progress: '#7A9E7E', pending: '#C4A882' };

  area.innerHTML = projects.map(p => {
    const ganttRows = p.tasks.map(t => {
      const s = (new Date(t.start).getTime() - allStart) / 86400000;
      const d = (new Date(t.end).getTime() - new Date(t.start).getTime()) / 86400000;
      const left = Math.max(0, (s / totalDays) * 100).toFixed(1);
      const width = Math.min(100 - parseFloat(left), (d / totalDays) * 100).toFixed(1);
      return `<div class="gantt-row">
        <div class="gantt-task-name">${t.name}</div>
        <div class="gantt-track">
          <div class="gantt-bar" style="left:${left}%;width:${width}%;background:${colors[t.status]};opacity:0.85;"></div>
        </div>
      </div>`;
    }).join('');
    return `<div class="project-card">
      <div class="project-header"><span class="project-name">${p.name}</span></div>
      <div class="gantt-wrap">
        <div class="gantt-months">${months.map(m=>`<div class="gantt-month">${m}</div>`).join('')}</div>
        ${ganttRows}
        <div style="display:flex;gap:12px;margin-top:10px;font-size:11px;font-family:sans-serif;">
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;background:#8B7355;border-radius:2px;display:inline-block;"></span>Completada</span>
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;background:#7A9E7E;border-radius:2px;display:inline-block;"></span>En progreso</span>
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;background:#C4A882;border-radius:2px;display:inline-block;"></span>Pendiente</span>
        </div>
      </div>
    </div>`;
  }).join('') || '<div class="empty-state">No hay proyectos para mostrar</div>';
}

function renderResumen(area) {
  const total = projects.length;
  const totalTasks = projects.reduce((a,p) => a + p.tasks.length, 0);
  const doneTasks = projects.reduce((a,p) => a + p.tasks.filter(t=>t.status==='done').length, 0);
  const progressTasks = projects.reduce((a,p) => a + p.tasks.filter(t=>t.status==='progress').length, 0);
  area.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;">
      <div style="background:var(--white);border-radius:12px;border:0.5px solid var(--border);padding:16px;text-align:center;">
        <div style="font-size:28px;font-weight:normal;color:var(--sand);">${total}</div>
        <div style="font-size:12px;font-family:sans-serif;color:var(--text-light);margin-top:4px;">Proyectos</div>
      </div>
      <div style="background:var(--white);border-radius:12px;border:0.5px solid var(--border);padding:16px;text-align:center;">
        <div style="font-size:28px;font-weight:normal;color:var(--green);">${doneTasks}</div>
        <div style="font-size:12px;font-family:sans-serif;color:var(--text-light);margin-top:4px;">Tareas completadas</div>
      </div>
      <div style="background:var(--white);border-radius:12px;border:0.5px solid var(--border);padding:16px;text-align:center;">
        <div style="font-size:28px;font-weight:normal;color:var(--amber);">${progressTasks}</div>
        <div style="font-size:12px;font-family:sans-serif;color:var(--text-light);margin-top:4px;">En progreso</div>
      </div>
    </div>
    ${projects.map(p => {
      const pct = getProgress(p.tasks);
      return `<div class="project-card" style="margin-bottom:12px;">
        <div class="project-header">
          <span class="project-name">${p.name}</span>
          <span class="badge active">Activo</span>
        </div>
        <div style="padding:14px 18px;">
          <div style="display:flex;justify-content:space-between;font-size:12px;font-family:sans-serif;color:var(--text-light);margin-bottom:6px;">
            <span>${p.tasks.length} tareas totales</span><span>${pct}% completado</span>
          </div>
          <div style="height:6px;background:#EDE8E0;border-radius:4px;">
            <div style="height:100%;width:${pct}%;background:var(--sand);border-radius:4px;transition:width 0.3s;"></div>
          </div>
        </div>
      </div>`;
    }).join('')}
    <button onclick="sendPrompt('¿Cómo puedo mejorar el seguimiento de mis proyectos?')" style="margin-top:8px;padding:10px 16px;border-radius:10px;border:0.5px solid var(--border);background:transparent;font-size:13px;font-family:sans-serif;cursor:pointer;color:var(--text-mid);">Pedir consejos para este cronograma ↗</button>
  `;
}

function fmtDate(d) { if(!d) return ''; const [y,m,day]=d.split('-'); const ms=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']; return `${parseInt(day)} ${ms[parseInt(m)-1]}`; }

function openModal() { document.getElementById('modal').classList.add('open'); const today = new Date().toISOString().split('T')[0]; document.getElementById('inp-start').value = today; document.getElementById('inp-proj').value = ''; }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function saveProject() {
  const name = document.getElementById('inp-proj').value.trim();
  if (!name) return;
  projects.push({ id: nextProjId++, name, status: 'active', start: document.getElementById('inp-start').value, end: document.getElementById('inp-end').value, tasks: [] });
  closeModal(); render();
}

function openTaskModal(pid) { currentProjectId = pid; document.getElementById('task-modal').classList.add('open'); document.getElementById('inp-task').value = ''; }
function closeTaskModal() { document.getElementById('task-modal').classList.remove('open'); currentProjectId = null; }
function saveTask() {
  const name = document.getElementById('inp-task').value.trim();
  if (!name || !currentProjectId) return;
  const p = projects.find(x => x.id === currentProjectId);
  if (p) { const ids = p.tasks.map(t=>t.id); const newId = ids.length ? Math.max(...ids)+1 : 1; p.tasks.push({ id: newId, name, start: document.getElementById('inp-task-start').value, end: document.getElementById('inp-task-end').value, status: document.getElementById('inp-status').value }); }
  closeTaskModal(); render();
}

function toggleTask(pid, tid) {
  const p = projects.find(x => x.id === pid);
  if (!p) return;
  const t = p.tasks.find(x => x.id === tid);
  if (!t) return;
  const cycle = { pending: 'progress', progress: 'done', done: 'pending' };
  t.status = cycle[t.status];
  render();
}

render();
</script>
